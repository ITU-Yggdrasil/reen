- name: tick
  signature:
    status: fixed
    rust: tick(&mut self) -> PlayerState
    source: fix.agent
    reason: functionality `tick` is missing a parseable signature
    evidence:
    - section: Functionalities / tick
      text: Read the current UTC millisecond count into `now_ms`. Let `elapsed_ms` be `now_ms.saturating_sub(game_state.game_started_ms())`. Let `elapsed_s` be `elapsed_ms / 1000` (integer whole seconds). Let `wait_ms` be `max(10_u64, (100.0_f64 / (1.0_f64 + (1.0_f64 + elapsed_s as f64).ln())) as u64)`. Sleep `wait_ms` milliseconds. Call `command.capture()` to collect pending input. Read the next gameplay action via `command.next_action()`. If a movement action was received and it neither repeats nor directly reverses the current direction, update the snake's direction. Compute the next head position from the current head and the current direction. If the next head lands on a wall cell or a snake body cell, return `PlayerState::Dead`. If food exists and the next head matches the food position, grow the snake by one segment, increase the score by 10, and call `food_dropper.drop()` for a replacement food position using the updated snake. Otherwise, advance the snake without growing; leave score and food placement unchanged. Return `PlayerState::Alive`.
  receiver: '&mut self'
  returns:
    status: resolved
    rust: PlayerState
    source: fix.agent
  flow:
  - Read the current UTC millisecond count into `now_ms`.
  - Let `elapsed_ms` be `now_ms.saturating_sub(game_state.game_started_ms())`.
  - Let `elapsed_s` be `elapsed_ms / 1000` (integer whole seconds).
  - Let `wait_ms` be `max(10_u64, (100.0_f64 / (1.0_f64 + (1.0_f64 + elapsed_s as f64).ln())) as u64)`.
  - Sleep `wait_ms` milliseconds.
  - Call `command.capture()` to collect pending input.
  - Read the next gameplay action via `command.next_action()`.
  - If a movement action was received and it neither repeats nor directly reverses the current direction, update the snake's direction.
  - Compute the next head position from the current head and the current direction.
  - If the next head lands on a wall cell or a snake body cell, return `PlayerState::Dead`.
  - If food exists and the next head matches the food position, grow the snake by one segment, increase the score by 10, and call `food_dropper.drop()` for a replacement food position using the updated snake.
  - Otherwise, advance the snake without growing; leave score and food placement unchanged.
  - Return `PlayerState::Alive`.
  extensions:
  - 7a. No action is available → skip direction update; continue from step 9.
  - 7b. A fire action is received → ignore it; continue from step 9 with the current direction.
  - 11a. `food_dropper.drop()` returns no position → clear food from `game_state`.
  guarantee:
  - Input consumed in one tick is not replayed in the next.
  references:
    roles:
    - command
    - food_dropper
    - game_state
