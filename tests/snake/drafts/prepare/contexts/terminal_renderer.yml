  flow:
  - 'Signature: `render(&self, board: &Board, score: u32) -> anyhow::Result<()>`'
  - Ask `string_renderer` to format the current board picture and score as one text frame.
  - Split the frame text into rows on the `'\n'` character. Empty rows (including any trailing one produced by a final `'\n'`) are skipped.
  - For each row, starting at row index `0` and incrementing per row, position the cursor at column `0` of that row on `screen` using `crossterm::cursor::MoveTo(0, row)` and then write the row's characters. This makes every row begin at column `0` even when the terminal is in raw mode (where a bare `'\n'` does not return the cursor to column `0`).
  - After all rows have been written, flush `screen` so the frame appears immediately.
  extensions:
  - 2a. The terminal supports the home escape sequence → the previously shown frame is overwritten in place without visible flicker.
  references:
    roles:
    - string_renderer
    props:
    - screen
