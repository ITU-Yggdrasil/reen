  kind: projection
  title: String Renderer
export:
  name: StringRenderer
mutable: false
roles:
- name: board
  purpose: Supplies the picture of the current board as a two-dimensionel array where the indices match (x,y)
  expected_behavior: Allows the renderer to read what symbol should appear at each visible position
  type:
    status: resolved
    rust: Board
    source: name_match
  methods:
  - name: width
    signature:
      status: resolved
      rust: 'width(&self, board_: &Board) -> u32'
      source: prepare.signature
    receiver: '&self'
    parameters:
    - name: board_
      type:
        status: resolved
        rust: '&Board'
        source: prepare.role_player
    returns:
      status: resolved
      rust: u32
      source: prepare.signature
    body:
      steps:
      - op: return
        expr:
          op: call_instance_method
          receiver:
            op: var
            name: board_
          method: width
          args: []
  - name: height
    signature:
      status: resolved
      rust: 'height(&self, board_: &Board) -> u32'
      source: prepare.signature
    receiver: '&self'
    parameters:
    - name: board_
      type:
        status: resolved
        rust: '&Board'
        source: prepare.role_player
    returns:
      status: resolved
      rust: u32
      source: prepare.signature
    body:
      steps:
      - op: return
        expr:
          op: call_instance_method
          receiver:
            op: var
            name: board_
          method: height
          args: []
  - name: symbol_at
    signature:
      status: resolved
      rust: 'symbol_at(&self, board_: &Board, x: u32, y: u32) -> char'
      source: prepare.signature
    receiver: '&self'
    parameters:
    - name: board_
      type:
        status: resolved
        rust: '&Board'
        source: prepare.role_player
    - name: x
      type:
        status: resolved
        rust: u32
        source: prepare.signature
    - name: y
      type:
        status: resolved
        rust: u32
        source: prepare.signature
    returns:
      status: resolved
      rust: char
      source: prepare.signature
    body:
      steps:
      - op: return
        expr:
          op: call_instance_method
          receiver:
            op: var
            name: board_
          method: symbol_at
          args:
          - op: var
            name: x
          - op: var
            name: y
props:
- name: score
  meaning: Score shown below the board
  type:
    status: resolved
    rust: u32
    source: draft_hint
  notes:
  - Type `u32`; same score the user sees during play
functionalities:
- name: new
  signature:
    status: resolved
    rust: 'new(board: Board, score: u32) -> Self'
    source: prepare.auto
  parameters:
  - name: board
    type:
      status: resolved
      rust: Board
      source: name_match
  - name: score
    type:
      status: resolved
      rust: u32
      source: draft_hint
  returns:
    status: resolved
    rust: Self
    source: prepare.auto
  body:
    steps:
    - op: return
      expr:
        op: construct_struct
        type_name: Self
        fields:
        - name: board
          expr:
            op: var
            name: board
        - name: score
          expr:
            op: var
            name: score
- name: render
  signature:
    status: resolved
    rust: 'render(&self, board: &Board, score: u32) -> String'
    source: prepare.signature
  receiver: '&self'
  parameters:
  - name: board
    type:
      status: resolved
      rust: '&Board'
      source: prepare.signature
  - name: score
    type:
      status: resolved
      rust: u32
      source: prepare.signature
  returns:
    status: resolved
    rust: String
    source: prepare.signature
  flow:
  - 'Signature: `render(&self, board: &Board, score: u32) -> String`'
  - Iterate rows from top (y = 0) to bottom (y = `board.height() - 1`).
  - Within each row, iterate columns from left (x = 0) to right (x = `board.width() - 1`), appending the symbol returned by `board.symbol_at(x, y)`.
  - Append a newline character after each row.
  - 'After the last row, append the score line `Score: <score>` followed by a newline.'
  - Return the complete string.
  guarantee:
  - The renderer reads symbols from the supplied `board` and `score`; it does not decide what belongs in any cell.
  references:
    roles:
    - board
    props:
    - score
