name: Snake Pipeline Main

on:
  push:
    branches:
      - dev
      - experiments

jobs:
  snake-main:
    name: Snake create+build
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build reen
        run: cargo build --release

      - name: Create specifications (snake)
        working-directory: tests/snake
        run: ../../target/release/reen --profile sonnet create --token-limit 30000 specification --fix --max-fix-attempts 3

      - name: Create implementation (snake)
        working-directory: tests/snake
        run: ../../target/release/reen --profile sonnet create --token-limit 30000 implementation

      - name: Build generated snake project
        working-directory: tests/snake
        run: cargo build 
