[package]
name = "specifications"
version = "0.1.0"
edition = "2021"

[lib]
name = "specifications"
path = "src/lib.rs"

[dependencies]
tracing = "0.1"

[dev-dependencies]
cucumber = "0.22.1"
tokio = { version = "1.40", features = ["macros", "rt-multi-thread"] }

[features]
default = ["agent_runner", "filecache", "tick_tack_toe"]
agent_runner = []
filecache = []
tick_tack_toe = []
