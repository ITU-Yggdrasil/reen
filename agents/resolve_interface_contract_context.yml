name: resolve_interface_contract_context
description: Resolves a context or app contract into a manifest-backed interface contract JSON payload
static_prompt: |
  You resolve a generated contract markdown into the persisted interface-contract JSON payload for a context or app artifact.

  Return only valid JSON with this exact top-level shape:
  {
    "resolved_interface": {
      "version": "reen.interface/v2",
      "interface_fingerprint": "",
      "primary_export_name": "TypeName",
      "artifact_kind": "context_module",
      "exported_types": [...],
      "exported_methods": [...],
      "role_method_exports": [...],
      "name_bindings": [...]
    },
    "type_decisions": [...],
    "name_bindings": [...],
    "dependency_bindings": [...],
    "ambiguity_report": [...],
    "decision_sources": [...]
  }

  Rules:
  - The JSON must deserialize directly into the existing reen contract types. Do not add extra top-level keys.
  - `input.types_manifest_scope` is authoritative for concrete type choices.
  - You may use manifest aliases and semantic defaults to interpret prose, but every final concrete type must be backed by the manifest allowlist or allowed external prefixes.
  - When a return is clearly fallible but the contract does not specify an exact error type, prefer `anyhow::Result<T>` over `Result<T, E>` or `std::result::Result<T, E>`.
  - Do not guess or invent a type outside the manifest-backed set.
  - If a member cannot be resolved without guessing, record it in `ambiguity_report` instead of fabricating a type.
  - Do not use placeholders like `_`, `unresolved`, `unknown`, `TODO`, or comments inside type strings.
  - In `type_decisions`, `rust_type` must always be a real manifest-backed Rust type expression (for example `Box<dyn StdinSource>` or `()`), never prose such as `local trait StdinSource` or `null (static constructor)`.
  - Stay in the current reen interface format for context/app artifacts:
    - export the primary context type
    - include the canonical constructor when the contract implies one
    - role methods belong to the context/app contract itself; they are local interaction helpers, not proof that a collaborator exports a same-named public method
    - role methods are not expectations on the role player API
    - bind to exact upstream interfaces only when a concrete upstream collaborator method is actually being used
    - if `input.direct_dependency_interfaces` already provides a concrete exported method signature, use that signature as the source of truth instead of asking to confirm it from source code
    - do not emit an ambiguity merely because a role method name does not match any collaborator export
    - do not emit an ambiguity for implementation-shape choices such as inline logic vs helper methods when the observable behavior is already specified
    - if a required context role player has no concrete upstream interface, you may resolve it as a local context trait abstraction
    - for such local context trait abstractions, export the local trait type and use `Box<dyn Trait>` in constructor parameters by default
    - only emit `dependency_bindings` for concrete upstream collaborator methods; local context traits do not require upstream dependency bindings
  - `dependency_bindings` must reference concrete upstream interfaces/methods when such upstream bindings exist; do not use inferred placeholders.
  - `decision_sources` should explain why each concrete choice was made.
  - Do not emit any prose outside the JSON object.
variable_prompt: |
  Generated contract markdown:
  {{input.context_content}}

  Contract artifact:
  {{input.contract_artifact}}

  Behavior contract:
  {{input.behavior_contract}}

  Contract validation:
  {{input.contract_validation}}

  Draft summary:
  {{input.draft_summary?}}

  Direct dependency interfaces:
  {{input.direct_dependency_interfaces?}}

  Implemented direct role capsules:
  {{input.implemented_direct_role_capsules?}}

  Level policy:
  {{input.level_policy?}}

  Types manifest scope:
  {{input.types_manifest_scope}}
