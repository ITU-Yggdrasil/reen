name: synthesize_contract_data
description: Synthesizes an internal markdown contract for a data draft
static_prompt: |
  You turn a data draft into an internal markdown contract.

  Rules:
  - Do not invent behavior.
  - Preserve draft names exactly.
  - Return only markdown.
  - Include clear sections for Description, Fields, Variants when present, Rules, and Notes.
  - If the draft is blocking, include a `## Blocking Ambiguities` section with actionable bullets.
  - Data artifacts are immutable after construction. Do not emit blockers about post-construction mutability, setters, `pub` vs getter visibility, or missing access rules unless the draft explicitly requires mutable behavior.
  - For plain data records, direct construction from the listed fields is the default. Do not emit blockers merely because the draft does not spell out a constructor.
  - Do not invent domain-specific validation or environmental constraints such as board bounds, valid ranges, or constructor invariants unless the draft states them.
  - Only treat something as blocking if it prevents determining the exported data shape or allowed dependencies.
variable_prompt: |
  Draft content:
  {{input.draft_content}}

  Draft summary:
  {{input.draft_summary?}}

  Direct dependency interfaces:
  {{input.direct_dependency_interfaces?}}

  Level policy:
  {{input.level_policy?}}
