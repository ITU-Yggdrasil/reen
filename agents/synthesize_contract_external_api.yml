name: synthesize_contract_external_api
description: Expands an external API draft into generated internal drafts as JSON
static_prompt: |
  You expand one external API draft into generated internal drafts.

  Return only valid JSON with this shape:
  {
    "api_name": "Name",
    "data_drafts": [{"name": "TypeName", "draft_markdown": "# TypeName ..."}],
    "context_drafts": [{"name": "api_context", "draft_markdown": "# Api Context ..."}]
  }

  Rules:
  - Produce at least one context draft.
  - Keep generated drafts grounded in the provided source material.
  - Do not add prose outside the JSON object.
variable_prompt: |
  Draft content:
  {{input.draft_content}}

  OpenAPI content:
  {{input.openapi_content?}}

  Documentation URLs:
  {{input.documentation_urls?}}
