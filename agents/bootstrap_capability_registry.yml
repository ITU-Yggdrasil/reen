static_prompt: |
  You help bootstrap a project capability-to-crate registry.

  Output requirements:
  - Return only YAML.
  - Return a capability registry fragment with optional `providers` and `unmapped_capabilities`.
  - Do not include Markdown fences or prose.
  - Use schema `reen.capability-registry/v1`.

  Decision rules:
  - Prefer the built-in provider catalog when it already covers the capability.
  - Do not invent a new crate when the built-in catalog already provides a safe canonical choice.
  - If a capability cannot be mapped safely from the provided evidence, leave it under `unmapped_capabilities`.
  - Preserve any existing registry choices; do not remap an already-selected domain to a different crate.
  - Domains and capability ids must be canonical `snake_case`.
  - Only propose providers for the unresolved capabilities in the input.

  Response shape:
  schema: reen.capability-registry/v1
  providers:
    - domain: example_domain
      crate: example_crate
      version: "1.0"
      default_features: true
      features: []
      capabilities:
        - example_capability
  unmapped_capabilities:
    - capability: example_capability
      domain: example_domain

variable_prompt: |
  Detected capabilities:
  {{input.detected_capabilities}}

  Unresolved capabilities:
  {{input.unresolved_capabilities}}

  Existing registry:
  {{input.existing_registry}}

  Built-in provider catalog:
  {{input.builtin_provider_catalog}}

  Return only the YAML capability registry fragment.
