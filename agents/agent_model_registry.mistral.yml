# Preset profile: Mistral-first defaults.
# Activate by copying this file over `agent_model_registry.yml` before building.
# Maximum API requests per second (optional). Can also be set via --rate-limit or REEN_RATE_LIMIT.
rate_limit: 2

create_specifications_data:
  model: mistral/mistral-large-latest
  parallel: true
create_specifications_context:
  model: mistral/mistral-large-latest
  parallel: true
create_specifications_main:
  model: mistral/mistral-large-latest
  parallel: true
create_specifications_external_api:
  model: mistral/mistral-large-latest
  parallel: false
  batch: false
create_specifications_brand:
  model: mistral/mistral-large-latest
  parallel: false
  batch: false
create_implementation:
  model: mistral/codestral-latest
  parallel: true
create_test:
  model: mistral/codestral-latest
  parallel: false
resolve_compilation_errors:
  model: mistral/codestral-latest
  parallel: false
fix_draft_blockers:
  model: mistral/mistral-large-latest
  parallel: false
