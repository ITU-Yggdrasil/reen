# Preset profile: Mistral-first defaults.
# Activate by copying this file over `agent_model_registry.yml` before building.
# Maximum API requests per second (optional). Can also be set via --rate-limit or REEN_RATE_LIMIT.
rate_limit: 2

coordinate_contract_level:
  model: mistral/mistral-large-latest
  parallel: false
  batch: false
synthesize_contract_data:
  model: mistral/mistral-large-latest
  parallel: true
resolve_interface_contract_data:
  model: mistral/mistral-large-latest
  parallel: true
  batch: false
synthesize_contract_context:
  model: mistral/mistral-large-latest
  parallel: true
resolve_interface_contract_context:
  model: mistral/mistral-large-latest
  parallel: true
  batch: false
synthesize_contract_projection:
  model: mistral/mistral-large-latest
  parallel: true
resolve_interface_contract_projection:
  model: mistral/mistral-large-latest
  parallel: true
  batch: false
synthesize_contract_external_api:
  model: mistral/mistral-large-latest
  parallel: false
  batch: false
bootstrap_capability_registry:
  model: mistral/mistral-large-latest
  parallel: false
  batch: false
create_implementation_data:
  model: mistral/codestral-latest
  parallel: true
create_implementation_projection:
  model: mistral/codestral-latest
  parallel: true
create_implementation_context:
  model: mistral/codestral-latest
  parallel: true
create_test:
  model: mistral/codestral-latest
  parallel: true
resolve_compilation_errors:
  model: mistral/codestral-latest
  parallel: false
fix_draft_blockers:
  model: mistral/mistral-large-latest
  parallel: false
